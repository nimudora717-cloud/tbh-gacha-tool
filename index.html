  <div style="max-width:1100px; margin:16px auto 0; padding:0 20px; text-align:center;">

      <!-- フェッチバー -->
      <div class="fetch-bar">
        <button class="fetch-btn" id="fetchAllBtn" onclick="fetchCoinPrices()">

        <span class="fetch-status" id="fetchStatus">⏳ 価格データを読み込み中…</span>
        <div class="spinner hidden" id="fetchSpinner"></div>
      </div>

      <!-- グレード別価格 -->
      <section class="section" id="gradeSection">
        <div class="section-title">
          <div class="icon" style="background:rgba(0,229,160,0.15); color:var(--accent);">💎</div>
          グレード別 平均マーケット価格（¥）

        <div class="grade-grid" id="gradeGrid"></div>
      </section>

      <!-- 広告: NordVPN（468x60 EPC50+ CTR4%） -->
      <div style="text-align:center; margin:20px 0;">
        <a href="https://px.a8.net/svt/ejp?a8mat=4B5N46+ARL7LE+3YFI+61Z81" rel="nofollow">

        <div class="section-title">
          <div class="icon" style="background:rgba(255,215,64,0.15); color:var(--gold);">📊</div>
          サマリー
        </div>
        <div id="summaryPanel"></div>
      </div>

      <!-- 広告: サイドバー -->
      <div style="text-align:center; margin-bottom:16px;">
        <a href="https://rpx.a8.net/svt/ejp?a8mat=4B5N42+CYRV1U+2HOM+656YP&rakuten=y&a8ejpredirect=http%3A%2F%2Fhb.afl.rakuten.co.jp%2Fhgc%2F0ea62065.34400275.0ea62066.204f04c0%2Fa26060320986_4B5N42_CYRV1U_2HOM_656YP%3Fpc%3Dhttp%253A%252F%252Fwww.rakuten.co.jp%252F%26m%3Dhttp%253A%252F%252Fm.rakuten.co.jp%252F" rel="nofollow">

      </div>

      <!-- 広告: NordVPN サイドバー（200x100 EPC39 CTR5%+） -->
      <div style="text-align:center; margin-bottom:16px;">
        <a href="https://px.a8.net/svt/ejp?a8mat=4B5N46+ARL7LE+3YFI+63WO1" rel="nofollow">
        <img border="0" width="200" height="100" alt="" src="https://www27.a8.net/svt/bgt?aid=260603718651&wid=001&eno=01&mid=s00000018459001026000&mc=1" style="max-width:100%;"></a>
        <img border="0" width="1" height="1" src="https://www17.a8.net/0.gif?a8mat=4B5N46+ARL7LE+3YFI+63WO1" alt="">
      </div>

      <!-- ソート -->
      <div class="section">
        <div class="section-title">⚙️ 表示設定</div>
        <div style="display:flex; flex-wrap:wrap; gap:4px;">
          <button class="gacha-coin-btn active" data-sort="roi" onclick="setSort('roi',this)">ROI順</button>
          <button class="gacha-coin-btn" data-sort="profit" onclick="setSort('profit',this)">利益順</button>
          <button class="gacha-coin-btn" data-sort="grade" onclick="setSort('grade',this)">グレード順</button>
        </div>
        <div style="margin-top:12px;">
          <label style="font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px;">
            <input type="checkbox" id="feeToggle" onchange="render()">
            Steam手数料(15%)を考慮
          </label>
        </div>
        <div style="margin-top:8px;">
          <label style="font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px;">
            <input type="checkbox" id="medianToggle" onchange="applyCatStats(); render();">
            中央値で計算（チェックなし＝平均）
          </label>
          <div style="font-size:10px; color:var(--text3); margin-top:3px; line-height:1.4;">
            価格ベース: <span id="priceBaseLabel" style="color:var(--accent);">読み込み中…</span>

        </div>
